<!DOCTYPE html>
<html>
<head>
  <title>Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <h1>🎒 Inventory</h1>
  <div id="inv"></div>
</div>

<script>
let inv = JSON.parse(localStorage.getItem("inventory")) || [];

document.getElementById("inv").innerHTML =
  inv.map(i => `<p>🎁 ${i.name} (${i.value})</p>`).join("");
</script>

</body>
</html>
